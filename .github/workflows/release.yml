name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64, ext: zip }
          - { os: windows-latest, rid: win-arm64, ext: zip }
          - { os: ubuntu-latest, rid: linux-x64, ext: tar.gz }
          - { os: ubuntu-latest, rid: linux-arm64, ext: tar.gz }
          - { os: macos-latest, rid: osx-x64, ext: tar.gz }
          - { os: macos-latest, rid: osx-arm64, ext: tar.gz }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: 10.0.301 }
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - name: Build and test
        shell: bash
        run: |
          dotnet restore VirtualSmartMotionCell.sln
          dotnet build VirtualSmartMotionCell.sln -c Release --no-restore
          dotnet run --project tests/VirtualSmartMotionCell.Specs -c Release --no-build
          dotnet run --project tests/VirtualSmartMotionCell.IntegrationSpecs -c Release --no-build
          npm ci --prefix web/viewer --no-audit --no-fund
          npm run build --prefix web/viewer
      - name: Publish self-contained applications
        shell: bash
        run: |
          dotnet publish src/VirtualSmartMotionCell.Api -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o artifacts/runtime-${{ matrix.rid }}
          dotnet publish src/VirtualSmartMotionCell.Hmi -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o artifacts/hmi-${{ matrix.rid }}
          dotnet publish tools/VirtualSmartMotionCell.MesSimulator -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o artifacts/mes-simulator-${{ matrix.rid }}
          rm -rf artifacts/runtime-${{ matrix.rid }}/wwwroot
          mkdir -p artifacts/runtime-${{ matrix.rid }}/wwwroot
          cp -R web/viewer/dist/. artifacts/runtime-${{ matrix.rid }}/wwwroot/
      - name: Package, checksum, and create SBOM
        shell: bash
        run: |
          python scripts/generate_sbom.py --output artifacts/release/sbom-${{ matrix.rid }}.spdx.json
          python scripts/package_release.py --rid ${{ matrix.rid }} --extension ${{ matrix.ext }}
      - uses: actions/attest@v4
        with:
          subject-path: artifacts/release/*
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/release/*
          if-no-files-found: error

  viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - run: npm ci --prefix web/viewer --no-audit --no-fund
      - run: npm run build --prefix web/viewer
      - name: Package standalone viewer
        run: |
          cd web/viewer/dist
          zip -r ../../../virtual-smart-motion-cell-viewer.zip .
      - uses: actions/attest@v4
        with: { subject-path: virtual-smart-motion-cell-viewer.zip }
      - uses: actions/upload-artifact@v7
        with:
          name: release-viewer
          path: virtual-smart-motion-cell-viewer.zip

  github-release:
    needs: [publish, viewer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find artifacts -type f -print | sort)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" --verify-tag --generate-notes
