name: Feature request
description: Propose a scoped capability
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem, description: Describe the equipment-software problem, not only the preferred implementation. }
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes: { label: Proposed behavior }
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes: { label: Alternatives and tradeoffs }
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: Changes public contracts
        - label: Changes persistent data
        - label: Adds platform-specific behavior
        - label: Requires a design proposal
