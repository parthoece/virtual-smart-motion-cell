name: Architecture proposal
description: Propose a significant architecture or contract change
title: "[Architecture]: "
labels: ["architecture", "proposal"]
body:
  - type: textarea
    id: context
    attributes: { label: Context and problem }
    validations: { required: true }
  - type: textarea
    id: decision
    attributes: { label: Proposed decision }
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes: { label: Alternatives considered }
    validations: { required: true }
  - type: textarea
    id: consequences
    attributes: { label: Compatibility, operations, security, and maintenance consequences }
    validations: { required: true }
