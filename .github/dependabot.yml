version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule: { interval: weekly }
    groups:
      avalonia:
        patterns: ["Avalonia*"]
  - package-ecosystem: pip
    directory: /reference/python-simulator
    schedule: { interval: monthly }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
